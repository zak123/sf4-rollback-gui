name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
      VCPKG_ROOT: C:/vcpkg-ci
    steps:
      - uses: actions/checkout@v4

      # Let vcpkg push/pull prebuilt dependency binaries through the
      # Actions cache; without this a cold run rebuilds OpenSSL,
      # protobuf, and GameNetworkingSockets from source every time.
      - name: Export Actions cache environment for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # A full clone rather than the runner's preinstalled copy, so the
      # manifest's pinned baseline commit is always reachable.
      - name: Check out vcpkg
        run: git clone https://github.com/microsoft/vcpkg C:/vcpkg-ci

      - name: Bootstrap vcpkg
        shell: cmd
        run: C:\vcpkg-ci\bootstrap-vcpkg.bat -disableMetrics

      - name: Set up x86 MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_x86

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build msvc-build/ci

      # The smoke test drives a real server and clients over loopback;
      # a hang here means a MessageBox popped on a failure path, hence
      # the short timeout.
      - name: Session smoke test
        timeout-minutes: 5
        run: msvc-build/ci/SessionSmokeTest.exe

      - name: Package
        shell: pwsh
        run: |
          $bd = "msvc-build/ci"
          $hash = (Get-FileHash "$bd/Sidecar.dll" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$bd/sidecar-hash.txt" -Value $hash -Encoding ascii -NoNewline
          Write-Host "Sidecar SHA256: $hash"

          $runtime = @(
            "GameNetworkingSockets.dll",
            "libprotobuf.dll",
            "libcrypto-3.dll",
            "spdlog.dll",
            "fmt.dll",
            "abseil_dll.dll"
          )
          $client = @("Launcher.exe", "Sidecar.dll", "LobbyClient.exe", "GGPO.dll") + $runtime + @("sidecar-hash.txt")
          $server = @("Lobbyd.exe") + $runtime + @("sidecar-hash.txt")

          New-Item -ItemType Directory dist | Out-Null
          Compress-Archive -Path ($client | ForEach-Object { Join-Path $bd $_ }) -DestinationPath dist/sf4-rollback-gui-client.zip
          Compress-Archive -Path ($server | ForEach-Object { Join-Path $bd $_ }) -DestinationPath dist/sf4-rollback-gui-server.zip

      - name: Upload client bundle
        uses: actions/upload-artifact@v4
        with:
          name: sf4-rollback-gui-client
          path: dist/sf4-rollback-gui-client.zip

      - name: Upload server bundle
        uses: actions/upload-artifact@v4
        with:
          name: sf4-rollback-gui-server
          path: dist/sf4-rollback-gui-server.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
