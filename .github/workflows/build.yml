name: build

# Builds are deliberate, not per-commit: push the ref you want built to
# the "build" branch (ex. `git push origin main:build`), or use the Run
# workflow button. Grab the two bundles from the run's artifacts and
# attach them to a GitHub release- keeping the exact filenames, which
# the VPS self-updater matches on.
on:
  push:
    branches: [ build, linux-server ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    # Pushes to linux-server only exercise the linux job below; the
    # full Windows build still runs for the build branch, PRs, and
    # manual dispatch.
    if: github.event_name != 'push' || github.ref_name == 'build'
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
      VCPKG_ROOT: C:/vcpkg-ci
    steps:
      - uses: actions/checkout@v4

      # Let vcpkg push/pull prebuilt dependency binaries through the
      # Actions cache; without this a cold run rebuilds OpenSSL,
      # protobuf, and GameNetworkingSockets from source every time.
      - name: Export Actions cache environment for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # A full clone rather than the runner's preinstalled copy, so the
      # manifest's pinned baseline commit is always reachable.
      - name: Check out vcpkg
        run: git clone https://github.com/microsoft/vcpkg C:/vcpkg-ci

      - name: Bootstrap vcpkg
        shell: cmd
        run: C:\vcpkg-ci\bootstrap-vcpkg.bat -disableMetrics

      - name: Set up x86 MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_x86

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build msvc-build/ci

      # The smoke test drives a real server and clients over loopback;
      # a hang here means a MessageBox popped on a failure path, hence
      # the short timeout.
      - name: Session smoke test
        timeout-minutes: 5
        run: msvc-build/ci/SessionSmokeTest.exe

      - name: Package
        shell: pwsh
        run: |
          $bd = "msvc-build/ci"
          $hash = (Get-FileHash "$bd/Sidecar.dll" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$bd/sidecar-hash.txt" -Value $hash -Encoding ascii -NoNewline
          Write-Host "Sidecar SHA256: $hash"

          # Bundle the x86 C++ runtime so fresh machines (VPSes, testers
          # without the redist) can run the binaries as-is. The CRT
          # folder name tracks the toolset generation (Microsoft.VC143,
          # VC144, ...), so glob rather than hardcode it.
          $crtDir = Get-ChildItem "$env:VCToolsRedistDir/x86" -Directory -Filter "Microsoft.VC*.CRT" |
            Select-Object -First 1
          if (-not $crtDir) { throw "Could not locate the x86 CRT redist under $env:VCToolsRedistDir" }
          Get-ChildItem $crtDir.FullName |
            Where-Object { $_.Name -in @("msvcp140.dll", "vcruntime140.dll") } |
            Copy-Item -Destination $bd -Force

          $runtime = @(
            "GameNetworkingSockets.dll",
            "libprotobuf.dll",
            "libcrypto-3.dll",
            "spdlog.dll",
            "fmt.dll",
            "abseil_dll.dll",
            "msvcp140.dll",
            "vcruntime140.dll"
          )
          # The server bundle carries its own launch wrapper and
          # self-updater so a deployed box stays current on its own.
          Copy-Item scripts/run-lobbyd.bat, scripts/vps-update.ps1 $bd -Force

          $client = @("Launcher.exe", "Sidecar.dll", "LobbyClient.exe", "GGPO.dll", "notify.wav") + $runtime + @("sidecar-hash.txt")
          $server = @("Lobbyd.exe", "run-lobbyd.bat", "vps-update.ps1") + $runtime + @("sidecar-hash.txt")

          New-Item -ItemType Directory dist | Out-Null
          Compress-Archive -Path ($client | ForEach-Object { Join-Path $bd $_ }) -DestinationPath dist/sf4-rollback-gui-client.zip
          Compress-Archive -Path ($server | ForEach-Object { Join-Path $bd $_ }) -DestinationPath dist/sf4-rollback-gui-server.zip

      - name: Upload client bundle
        uses: actions/upload-artifact@v4
        with:
          name: sf4-rollback-gui-client
          path: dist/sf4-rollback-gui-client.zip

      - name: Upload server bundle
        uses: actions/upload-artifact@v4
        with:
          name: sf4-rollback-gui-server
          path: dist/sf4-rollback-gui-server.zip

      # Published as its own release asset too, so the Linux server's
      # updater can pin the matching game build without downloading a
      # Windows bundle.
      - name: Upload sidecar hash
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-hash
          path: msvc-build/ci/sidecar-hash.txt

  # The dedicated server also builds on Linux (cheaper always-on
  # hosting). Only Session, Lobbyd, and the smoke test exist there; the
  # smoke test is the correctness gate for the port. Built inside an
  # Amazon Linux 2023 container because that's the deployed box's
  # distro: a binary from the stock ubuntu runner links glibc 2.38+
  # symbols and won't load against AL2023's glibc 2.34.
  linux-server:
    runs-on: ubuntu-latest
    container: amazonlinux:2023
    timeout-minutes: 60
    env:
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
      VCPKG_ROOT: /opt/vcpkg-ci
    steps:
      - name: Install build tools
        run: dnf install -y gcc gcc-c++ make cmake ninja-build git tar gzip zip unzip perl pkgconfig python3 which

      - uses: actions/checkout@v4

      - name: Export Actions cache environment for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Check out vcpkg
        run: git clone https://github.com/microsoft/vcpkg /opt/vcpkg-ci

      - name: Bootstrap vcpkg
        run: /opt/vcpkg-ci/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure
        run: >
          cmake -B build-linux -S .
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_TOOLCHAIN_FILE=/opt/vcpkg-ci/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build-linux --parallel

      - name: Session smoke test
        timeout-minutes: 5
        run: build-linux/SessionSmokeTest

      - name: Package
        run: |
          mkdir -p stage dist
          cp build-linux/Lobbyd stage/
          # The GNS shared library and its deps ship beside the binary;
          # the launch wrapper sets LD_LIBRARY_PATH to the install dir.
          cp build-linux/vcpkg_installed/x64-linux/lib/*.so* stage/ 2>/dev/null || true
          # Deploy kit: launch wrapper, self-updater, systemd units.
          cp scripts/run-lobbyd.sh scripts/linux-update.sh \
             scripts/sf4e-lobbyd.service scripts/sf4e-update.service \
             scripts/sf4e-update.timer stage/
          chmod +x stage/run-lobbyd.sh stage/linux-update.sh
          tar -C stage -czf dist/sf4-rollback-gui-server-linux.tar.gz .

      - name: Upload Linux server bundle
        uses: actions/upload-artifact@v4
        with:
          name: sf4-rollback-gui-server-linux
          path: dist/sf4-rollback-gui-server-linux.tar.gz
